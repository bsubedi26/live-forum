services:
  app:
    build: .
    ports:
      - "${PORT:-3030}:3030"
    environment:
      NODE_ENV: production
      PORT: "3030"
    volumes:
      - forum-data:/app/data
    restart: unless-stopped
    networks:
      - shared-tunnel-net

volumes:
  forum-data:
networks:
  shared-tunnel-net:
    external: true
