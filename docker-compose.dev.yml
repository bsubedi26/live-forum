services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-3000}:3000"
      - "${SERVER_PORT:-3030}:3030"
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: http://localhost:3030
    volumes:
      - ./client:/app/client
      - ./server:/app/server
      - /app/client/node_modules
      - /app/server/node_modules
    restart: unless-stopped
